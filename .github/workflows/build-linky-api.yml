name: Build & Push Linky API (Slim)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version from root package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if version already exists on Docker Hub
        id: check
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/linky-api"
          VERSION="${{ steps.version.outputs.version }}"

          if docker manifest inspect "$IMAGE:$VERSION-slim" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip build (version already exists)
        if: steps.check.outputs.exists == 'true'
        run: echo "Image version already exists. Skipping build."

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.check.outputs.exists == 'false'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build fat image
        if: steps.check.outputs.exists == 'false'
        run: |
          docker build \
            -f Dockerfile.api \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/linky-api:${{ steps.version.outputs.version }}-fat \
            .

      - name: Install slimtoolkit (mint)
        if: steps.check.outputs.exists == 'false'
        run: |
          curl -sL https://raw.githubusercontent.com/slimtoolkit/slim/master/scripts/install-slim.sh | sudo bash

      - name: Build slim image
        if: steps.check.outputs.exists == 'false'
        run: |
          slim build \
            --target ${{ secrets.DOCKERHUB_USERNAME }}/linky-api:${{ steps.version.outputs.version }}-fat \
            --tag ${{ secrets.DOCKERHUB_USERNAME }}/linky-api:${{ steps.version.outputs.version }}-slim \
            --tag ${{ secrets.DOCKERHUB_USERNAME }}/linky-api:latest \
            --http-probe=false

      - name: Push slim images
        if: steps.check.outputs.exists == 'false'
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/linky-api:${{ steps.version.outputs.version }}-slim
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/linky-api:latest
