<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Linky — Offline</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: #fafafa;
        color: #0a0a0a;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #0a0a0a;
          color: #fafafa;
        }
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        margin: 0 0 0.5rem;
      }
      p {
        margin: 0 0 1.25rem;
        text-align: center;
        max-width: 22rem;
        line-height: 1.5;
        opacity: 0.85;
      }
      button {
        appearance: none;
        border: 1px solid color-mix(in oklab, currentColor 25%, transparent);
        background: color-mix(in oklab, currentColor 8%, transparent);
        color: inherit;
        padding: 0.5rem 1rem;
        border-radius: 0.5rem;
        font-size: 0.9375rem;
        font-weight: 500;
        cursor: pointer;
      }
      button:focus-visible {
        outline: 2px solid currentColor;
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <h1>You are offline</h1>
    <p>Check your connection, then try again. Video calls need an internet connection.</p>
    <button type="button" id="retry">Try again</button>
    <script>
      document.getElementById("retry").addEventListener("click", function () {
        window.location.reload();
      });
    </script>
  </body>
</html>
