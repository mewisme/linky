services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: linky-api
    ports:
      - "7270:7270"
    environment:
      NODE_ENV: production
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://localhost:7270/healthz | grep -q 'ok'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    profiles: ["app"]
    networks:
      - linky-network
    env_file:
      - ${LINKY_API_ENV_FILE}

  redis:
    image: redis:7-alpine
    container_name: linky-redis
    ports:
      - "7181:6379"
    command: >
      sh -c "
      if [ -n \"$$REDIS_PASSWORD\" ]; then
        redis-server --requirepass $$REDIS_PASSWORD
      else
        redis-server
      fi
      "
      - infra
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    profiles: ["infra"]
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - linky-network

  ollama:
    image: ollama/ollama:latest
    container_name: linky-ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    profiles: ["ollama"]
    networks:
      - linky-network
    volumes:
      - ollama-data:/root/.ollama

volumes:
  redis-data:
  ollama-data:

networks:
  linky-network:
    external: true
