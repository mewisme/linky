services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: linky-api
    ports:
      - "7270:7270"
    environment:
      NODE_ENV: production
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_PORT: ${REDIS_PORT:-6379}
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://localhost:3001/healthz | grep -q 'ok'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - linky-network
    env_file:
      - ${LINKY_API_ENV_FILE}

  redis:
    image: redis:7-alpine
    container_name: linky-redis
    ports:
      - "7181:6379"
    command: >
      sh -c "
      if [ -n \"$$REDIS_PASSWORD\" ]; then
        redis-server --requirepass $$REDIS_PASSWORD
      else
        redis-server
      fi
      "
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - linky-network

volumes:
  redis-data:

networks:
  linky-network:
    driver: bridge
