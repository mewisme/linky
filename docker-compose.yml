services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: linky-api
    ports:
      - "7270:7270"
    environment:
      NODE_ENV: production
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "const http=require(''http''); console.error(''[healthcheck] ping''); http.get(''http://127.0.0.1:7270/healthz'', r => { if (r.statusCode !== 200) process.exit(1); r.resume(); }).on(''error'', e => { console.error(e); process.exit(1); })"',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - linky-network
    env_file:
      - ${LINKY_API_ENV_FILE}

  redis:
    image: redis:8-alpine
    container_name: linky-redis
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - linky-network

  ollama:
    build:
      context: .
      dockerfile: Dockerfile.ollama
    container_name: linky-ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    healthcheck:
      test: "ollama --version && ollama ps || exit 1"
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    networks:
      - linky-network
    volumes:
      - ollama-data:/root/.ollama

volumes:
  redis-data:
  ollama-data:

networks:
  linky-network:
    external: true
