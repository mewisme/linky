services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: linky-api
    ports:
      - "${PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3001}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_USERNAME: ${REDIS_USERNAME:-}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      MQTT_CLIENT_URL: ${MQTT_CLIENT_URL}
      MQTT_CLIENT_PORT: ${MQTT_CLIENT_PORT}
      MQTT_CLIENT_WS_PORT: ${MQTT_CLIENT_WS_PORT}
      MQTT_CLIENT_USERNAME: ${MQTT_CLIENT_USERNAME}
      MQTT_CLIENT_PASSWORD: ${MQTT_CLIENT_PASSWORD}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET}
      CLOUDFLARE_TURN_API_TOKEN: ${CLOUDFLARE_TURN_API_TOKEN}
      CLOUDFLARE_TURN_KEY_ID: ${CLOUDFLARE_TURN_KEY_ID}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
    restart: unless-stopped
    networks:
      - linky-network
    env_file:
      - ${LINKY_API_ENV_FILE}

  redis:
    image: redis:7-alpine
    container_name: linky-redis
    ports:
      - "6379:6379"
    command: >
      sh -c "
      if [ -n \"$$REDIS_PASSWORD\" ]; then
        redis-server --requirepass $$REDIS_PASSWORD
      else
        redis-server
      fi
      "
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - linky-network
    profiles:
      - redis

volumes:
  redis-data:

networks:
  linky-network:
    driver: bridge
