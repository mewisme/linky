services:
  api:
    image: mewthedev/linky-api:latest
    container_name: linky-api
    ports:
      - "7270:7270"
    environment:
      NODE_ENV: production
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      OLLAMA_EMBEDDING_URL: ${OLLAMA_EMBEDDING_URL:-http://ollama:11434}
      OLLAMA_CLOUD_URL: ${OLLAMA_CLOUD_URL:-https://ollama.com}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-bge-m3}
      OLLAMA_CLOUD_MODEL: ${OLLAMA_CLOUD_MODEL:-ministral-3:14b}
      OLLAMA_EMBEDDING_TIMEOUT: ${OLLAMA_EMBEDDING_TIMEOUT:-60000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node dist/healthcheck.js"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - linky-network
    env_file:
      - .env

  redis:
    image: redis:8-alpine
    container_name: linky-redis
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - linky-network

  ollama:
    image: mewthedev/oe:latest
    container_name: linky-ollama
    restart: unless-stopped
    environment:
      OLLAMA_VULKAN: "1"
    healthcheck:
      test: "ollama --version && ollama ps || exit 1"
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    networks:
      - linky-network
    volumes:
      - ollama-data:/root/.ollama

volumes:
  redis-data:
  ollama-data:

networks:
  linky-network:
    driver: bridge
